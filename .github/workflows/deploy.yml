name: Create config.js and Deploy to GitHub Pages

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: [completed]
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event != 'workflow_run') }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
      
      - name: Create config.js from secret
        run: |
          PROXY_URL_VALUE="${{ secrets.PROXY_URL }}"
          if [ -z "$PROXY_URL_VALUE" ]; then
            PROXY_URL_VALUE="${{ vars.PROXY_URL }}"
          fi

          echo "// Auto-generated config from GitHub Secrets" > config.js
          echo "window.APP_CONFIG = {" >> config.js
          echo "    PROXY_URL: '$PROXY_URL_VALUE'," >> config.js
          echo "};" >> config.js
          echo "config.js generated"
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
