name: Create config.js and Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
    paths:
      - 'ImportScoreOnline/**'
      - 'ImportScoreOnline/.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Create config.js from secret
        run: |
          PROXY_URL_VALUE="${{ secrets.PROXY_URL }}"
          if [ -z "$PROXY_URL_VALUE" ]; then
            PROXY_URL_VALUE="${{ vars.PROXY_URL }}"
          fi

          echo "// Auto-generated config from GitHub Secrets" > config.js
          echo "window.APP_CONFIG = {" >> config.js
          echo "    PROXY_URL: '$PROXY_URL_VALUE'," >> config.js
          echo "};" >> config.js
          echo "config.js generated"
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
